<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, shrink-to-fit=no">
    <title>ATAS INDONESIA</title>
    <link rel="icon" type="image/png" href="./logo.png">
    <style>
        /* Hilangkan semua jarak margin bawaan browser */
        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            overflow: hidden; /* Matikan scroll bawaan web utama */
        }
        
        /* Buat iframe penuh 100% layar */
        iframe {
            width: 100%;
            height: 100%;
            border: none; /* Hilangkan garis pinggir iframe */
        }
    </style>
</head>
<body>

    <iframe src="https://atas-indonesia.blogspot.com/" title="Web Utama" sandbox="allow-scripts allow-same-origin allow-forms allow-popups"></iframe>
</body>
</html>
