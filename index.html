    <!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
     <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, shrink-to-fit=no">
    <title>ATAS INDONESIA</title>
    <link rel="icon" type="image/png" href="./logo.png">
    <style>
        body, html { margin: 0; padding: 0; height: 100%; overflow: hidden; }
        iframe { width: 100%; height: 100%; border: none; }
    </style>
<style>
  #smart-app-banner {
    position: fixed;
    bottom: -150px; /* Awalnya sembunyi */
    left: 0;
    width: 100%;
    background: #ffffff;
    box-shadow: 0 -4px 20px rgba(0,0,0,0.15);
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 12px 20px;
    box-sizing: border-box;
    z-index: 2147483647; /* Berada di atas iframe */
    transition: bottom 0.5s ease-out;
    font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
  }
  
  #smart-app-banner.show-banner {
    bottom: 0; /* Muncul ke atas */
  }
  
  .app-banner-left { display: flex; align-items: center; gap: 12px; }
  
  .app-banner-icon {
    width: 45px; height: 45px;
    border-radius: 10px; object-fit: cover;
    box-shadow: 0 2px 5px rgba(0,0,0,0.1);
  }
  
  .app-banner-info { display: flex; flex-direction: column; }
  
  .app-banner-title {
    font-size: 15px; font-weight: 700; color: #111; margin: 0 0 2px 0; line-height: 1.2;
  }
  
  .app-banner-desc { font-size: 12px; color: #666; margin: 0; font-weight: 500; }
  
  .app-banner-right { display: flex; align-items: center; gap: 15px; }
  
  .app-banner-btn {
    background: #01875f; color: #ffffff !important;
    font-weight: bold; font-size: 13px; padding: 7px 18px;
    border-radius: 20px; text-decoration: none;
    box-shadow: 0 2px 6px rgba(1, 135, 95, 0.4);
    letter-spacing: 0.5px;
  }
  
  .app-banner-close {
    background: none; border: none; font-size: 26px; color: #999;
    cursor: pointer; padding: 0; line-height: 1; outline: none;
  }
</style>

</head>

    
<body>

    <iframe id="myIframe" title="Web Utama" sandbox="allow-scripts allow-same-origin allow-forms allow-popups allow-popups-to-escape-sandbox"></iframe>
    

<div id="smart-app-banner">
  <div class="app-banner-left">
    <img src="logo.png" class="app-banner-icon" alt="Logo ATAS INA" />
    
    <div class="app-banner-info">
      <span class="app-banner-title">ATAS INDONESIA</span>
      <span class="app-banner-desc">Gratis di Google Play</span>
    </div>
  </div>
  <div class="app-banner-right">
    <a href="https://play.google.com/store/apps/details?id=atas.indonesia" id="btn-install-app" class="app-banner-btn" target="_blank">INSTALL</a>
    <button id="btn-close-banner" class="app-banner-close">&times;</button>
  </div>
</div>

<script>
  window.onload = function() {
    var banner = document.getElementById("smart-app-banner");
    var btnInstall = document.getElementById("btn-install-app");
    var btnClose = document.getElementById("btn-close-banner");

    var isAppInstalled = localStorage.getItem("atas_app_installed_final");

    // Jika belum install, munculkan setelah 1.5 detik
    if (!isAppInstalled) {
      setTimeout(function() {
        banner.classList.add("show-banner");
      }, 1500);
    }

    // Jika tombol INSTALL diklik -> Simpan memori, jangan muncul lagi
    btnInstall.onclick = function() {
      localStorage.setItem("atas_app_installed_final", "true");
      banner.classList.remove("show-banner");
    };

    // Jika tombol CLOSE diklik -> Sembunyikan saja (bisa muncul lagi nanti)
    btnClose.onclick = function() {
      banner.classList.remove("show-banner");
    };
  };
</script>
    <script>
        // 1. GANTI INI DENGAN ALAMAT BLOGGER KAMU (TIDAK BOLEH ADA GARIS MIRING DI UJUNGNYA)
        const BLOG_URL = "https://atas-indonesia.blogspot.com"; 
        
        const iframe = document.getElementById('myIframe');
        
        // 2. Cek apakah pengunjung datang dari Link Share (ada tanda Hash #)
        let hash = window.location.hash; 
        if (hash && hash.length > 1) {
            // Jika ada, langsung buka iframe ke artikel tersebut
            iframe.src = BLOG_URL + hash.substring(1); 
        } else {
            // Jika tidak ada, buka halaman depan biasa
            iframe.src = BLOG_URL;
        }

        // 3. Pasang Telinga: Dengarkan "bisikan" dari Blogger saat pindah halaman
        window.addEventListener('message', function(event) {
            if (event.data && event.data.type === 'pathChange') {
                // Update tulisan di Address Bar browser sesuai artikel yang sedang dibaca
                window.history.replaceState(null, null, '#' + event.data.path);
            }
        });
    </script>

    
</body>
</html>
